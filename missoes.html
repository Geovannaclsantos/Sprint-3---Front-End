<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Care Plus — Missões</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/care-city.css" />
  <style>
    .mission-card {
      background: var(--surface-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s;
      margin-bottom: 0.75rem;
    }
    .mission-card:hover { box-shadow: var(--shadow-sm); }
    .mission-card.completed { opacity: 0.55; }
    .mission-card.completed .mission-title { text-decoration: line-through; color: var(--text-muted); }
    .mission-icon-wrap {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      background: var(--surface);
    }
    .mission-title { font-family: 'Sora', sans-serif; font-weight: 600; font-size: 0.95rem; margin: 0; }
    .mission-meta { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.25rem; flex-wrap: wrap; }
    .mission-pill {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 50px;
    }
    .pill-easy { color: #066c46; background: #d1fae5; }
    .pill-med  { color: #944c0a; background: #fef3c7; }
    .pill-hard { color: #831f1f; background: #fee2e2; }
    .filter-chip {
      background: var(--surface-card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--primary); }
    .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .form-control, .form-select {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
      font-size: 0.9rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,201,167,0.1);
    }
    .form-label { font-weight: 600; font-size: 0.85rem; color: var(--text-main); margin-bottom: 0.3rem; }
    @media (max-width: 991px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand"><span style="color:var(--accent);">●</span> Care Plus</div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a href="care-city.html"><i class="bi bi-buildings-fill"></i> Care City</a>
    <a href="missoes.html" class="active"><i class="bi bi-flag-fill"></i> Missões</a>
    <a href="vitais.html"><i class="bi bi-heart-pulse-fill"></i> Dados Vitais</a>
    <a href="recompensas.html"><i class="bi bi-gift-fill"></i> Recompensas</a>
    <a href="perfil.html"><i class="bi bi-person-fill"></i> Perfil</a>
  </nav>
  <div class="sidebar-bottom">
    <a href="login.html" style="display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.85rem;border-radius:var(--radius-sm);color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.9rem;">
      <i class="bi bi-box-arrow-left"></i> Sair
    </a>
  </div>
</aside>

<main class="main-content">

  <header class="topbar">
    <div>
      <h1 style="font-size:1.5rem; font-weight:800; margin:0;">Missões</h1>
      <p style="color:var(--text-muted); font-size:0.88rem; margin:0;">Complete missões para evoluir sua Care City</p>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="xp-badge"><i class="bi bi-star-fill"></i> <span id="topbar-points">0</span> XP</div>
      <button class="btn-cp-primary" onclick="toggleForm()"><i class="bi bi-plus-lg"></i> Novo hábito</button>
    </div>
  </header>

  <!-- FORM (collapsible) -->
  <section id="habit-form-wrap" class="cp-card mb-3" style="display:none;">
    <h2 style="font-size:1rem; font-weight:700; margin-bottom:1rem;">
      <i class="bi bi-plus-circle" style="color:var(--accent);"></i> Cadastrar novo hábito
    </h2>
    <form id="habit-form" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label" for="habit-name">Nome do hábito *</label>
          <input type="text" class="form-control" id="habit-name" placeholder="Ex: Praticar yoga por 20 min" required>
          <div class="invalid-feedback">Informe um nome para o hábito.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="habit-category">Categoria</label>
          <select class="form-select" id="habit-category">
            <option>Sono</option><option>Hidratação</option><option>Movimento</option>
            <option>Saúde Mental</option><option>Check-up</option><option>Dados Vital</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="habit-freq">Frequência</label>
          <select class="form-select" id="habit-freq">
            <option>Diário</option><option>Semanal</option><option>Quinzenal</option><option>Mensal</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="habit-points">Pontuação (1-100) *</label>
          <input type="number" class="form-control" id="habit-points" min="1" max="100" placeholder="20" required>
          <div class="invalid-feedback">Informe um valor entre 1 e 100.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="habit-area">Área da cidade</label>
          <select class="form-select" id="habit-area">
            <option value="usina">⚡ Usina de Energia</option>
            <option value="parque">🌿 Parque do Equilíbrio</option>
            <option value="rios">💧 Rios da Hidratação</option>
            <option value="avenidas">🏃 Avenidas Ativas</option>
            <option value="hospital">🏥 Hospital Preventivo</option>
            <option value="dados">📊 Centro de Dados Vital</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn-cp-outline" onclick="toggleForm()">Cancelar</button>
        <button type="submit" class="btn-cp-accent">Salvar hábito</button>
      </div>
    </form>
  </section>

  <!-- FILTROS -->
  <div style="display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem; margin-bottom:1.25rem;">
    <button class="filter-chip active" data-filter="Todas">Todas</button>
    <button class="filter-chip" data-filter="Sono">Sono</button>
    <button class="filter-chip" data-filter="Hidratação">Hidratação</button>
    <button class="filter-chip" data-filter="Movimento">Movimento</button>
    <button class="filter-chip" data-filter="Saúde Mental">Saúde Mental</button>
    <button class="filter-chip" data-filter="Check-up">Check-up</button>
    <button class="filter-chip" data-filter="Dados Vital">Dados Vital</button>
  </div>

  <!-- LISTA -->
  <section id="missions-list"></section>

</main>

<!-- ===== MODAL FEEDBACK ===== -->
<div id="feedback-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:1050; align-items:center; justify-content:center; padding:1rem;">
  <div style="background:#fff; border-radius:var(--radius); max-width:380px; width:100%; padding:2rem; text-align:center; box-shadow:var(--shadow-md);">
    <div style="font-size:3.5rem; margin-bottom:0.5rem;">🎉</div>
    <h3 style="font-family:'Sora',sans-serif; font-weight:800; color:var(--primary); font-size:1.2rem; margin-bottom:0.3rem;">Missão concluída!</h3>
    <p id="modal-mission-title" style="color:var(--text-muted); font-size:0.9rem; font-weight:500; margin-bottom:1rem;"></p>
    <div style="background:var(--surface); border-radius:var(--radius-sm); padding:0.85rem; margin-bottom:1rem;">
      <span id="modal-points" style="font-family:'Sora',sans-serif; font-weight:800; font-size:1.6rem; color:var(--accent);">+0</span>
      <span style="color:var(--text-muted); font-size:0.85rem; margin-left:0.5rem;">pontos ganhos</span>
    </div>
    <p id="modal-message" style="color:var(--text-muted); font-size:0.88rem; line-height:1.5; margin-bottom:1.25rem;"></p>
    <button class="btn-cp-primary" style="width:100%;" onclick="closeFeedback()">Continuar jornada 🚀</button>
  </div>
</div>

<script>
const AREA_INFO = {
  usina: { icon: '⚡', name: 'Usina de Energia', msg: 'Sua ação fortaleceu a Usina de Energia! ⚡' },
  parque: { icon: '🌿', name: 'Parque do Equilíbrio', msg: 'O Parque do Equilíbrio floresceu! 🌿' },
  rios: { icon: '💧', name: 'Rios da Hidratação', msg: 'Os Rios da Hidratação estão fluindo! 💧' },
  avenidas: { icon: '🏃', name: 'Avenidas Ativas', msg: 'As Avenidas Ativas ganharam vida! 🏃' },
  hospital: { icon: '🏥', name: 'Hospital Preventivo', msg: 'O Hospital Preventivo está de pé! 🏥' },
  dados: { icon: '📊', name: 'Centro de Dados Vital', msg: 'O Centro de Dados foi atualizado! 📊' }
}
const STORAGE_KEY = 'careCity_missions'
let missions = []
let currentFilter = 'Todas'

async function loadMissions() {
  const stored = localStorage.getItem(STORAGE_KEY)
  if (stored) { try { missions = JSON.parse(stored) } catch(e) { missions = [] } }
  if (!missions.length) {
    const res = await fetch('data/missions.json')
    missions = await res.json()
  }
}

function saveMissions() { localStorage.setItem(STORAGE_KEY, JSON.stringify(missions)) }

function diffClass(d) { return d === 'Fácil' ? 'pill-easy' : d === 'Médio' ? 'pill-med' : 'pill-hard' }

function totalPoints() { return missions.filter(m => m.completed).reduce((s,m) => s + m.points, 0) }

function render() {
  document.getElementById('topbar-points').textContent = totalPoints()
  const filtered = currentFilter === 'Todas' ? missions : missions.filter(m => m.category === currentFilter)
  const pending = filtered.filter(m => !m.completed)
  const done = filtered.filter(m => m.completed)

  const list = document.getElementById('missions-list')
  list.innerHTML = ''

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-light);"><div style="font-size:3rem">🎯</div><p>Nenhuma missão nessa categoria</p></div>'
    return
  }

  if (pending.length) {
    list.innerHTML += '<h3 style="font-size:0.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.75rem;">Pendentes (' + pending.length + ')</h3>'
    pending.forEach(m => list.innerHTML += missionHTML(m))
  }
  if (done.length) {
    list.innerHTML += '<h3 style="font-size:0.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin:1.5rem 0 0.75rem;">Concluídas (' + done.length + ')</h3>'
    done.forEach(m => list.innerHTML += missionHTML(m))
  }
}

function missionHTML(m) {
  const area = AREA_INFO[m.area] || { icon: '⭐', name: m.category }
  return `
    <article class="mission-card ${m.completed ? 'completed' : ''}">
      <div class="mission-icon-wrap">${m.completed ? '✅' : area.icon}</div>
      <div style="flex:1; min-width:0;">
        <h4 class="mission-title">${m.title}</h4>
        <div class="mission-meta">
          <span class="mission-pill ${diffClass(m.difficulty)}">${m.difficulty}</span>
          <span style="color:var(--text-light); font-size:0.75rem;">${m.category}</span>
          <span style="color:var(--accent); font-weight:700; font-size:0.78rem;">+${m.points} pts</span>
        </div>
      </div>
      ${!m.completed ? `<button class="btn-cp-accent" style="font-size:0.78rem; padding:0.45rem 0.9rem;" onclick="completeMission(${m.id})">Concluir</button>` : ''}
    </article>
  `
}

function completeMission(id) {
  const m = missions.find(x => x.id === id)
  if (!m || m.completed) return
  m.completed = true
  saveMissions()
  showFeedback(m)
  render()
}

function showFeedback(m) {
  const modal = document.getElementById('feedback-modal')
  document.getElementById('modal-mission-title').textContent = m.title
  document.getElementById('modal-points').textContent = '+' + m.points
  document.getElementById('modal-message').textContent = (AREA_INFO[m.area] || {}).msg || 'Parabéns! 🎉'
  modal.style.display = 'flex'
}
function closeFeedback() { document.getElementById('feedback-modal').style.display = 'none' }

// Filtros
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
    chip.classList.add('active')
    currentFilter = chip.getAttribute('data-filter')
    render()
  })
})

// Form
function toggleForm() {
  const f = document.getElementById('habit-form-wrap')
  f.style.display = f.style.display === 'none' ? 'block' : 'none'
}

document.getElementById('habit-form').addEventListener('submit', (e) => {
  e.preventDefault()
  const name = document.getElementById('habit-name').value.trim()
  const points = parseInt(document.getElementById('habit-points').value, 10)
  const nameInput = document.getElementById('habit-name')
  const pointsInput = document.getElementById('habit-points')

  let ok = true
  if (!name) { nameInput.classList.add('is-invalid'); ok = false } else nameInput.classList.remove('is-invalid')
  if (!points || points < 1 || points > 100) { pointsInput.classList.add('is-invalid'); ok = false } else pointsInput.classList.remove('is-invalid')
  if (!ok) return

  const newM = {
    id: Date.now(),
    title: name,
    category: document.getElementById('habit-category').value,
    points: points,
    difficulty: 'Fácil',
    completed: false,
    area: document.getElementById('habit-area').value
  }
  missions.push(newM)
  saveMissions()
  document.getElementById('habit-form').reset()
  toggleForm()
  render()
})

// Init
loadMissions().then(render)
</script>
</body>
</html>
