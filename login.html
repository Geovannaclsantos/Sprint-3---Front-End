<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Care Plus — Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0F2347 0%, #1A3A6B 55%, #2A5298 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 70% 30%, rgba(0,201,167,0.15) 0%, transparent 60%),
        radial-gradient(circle at 20% 80%, rgba(42,82,152,0.4) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-md);
      position: relative;
      z-index: 2;
    }
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }
    .login-illustration {
      width: 130px; height: 100px;
      background-image: url('img/care-city.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin: 0 auto 1rem;
    }
    .form-control {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 0.92rem;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,201,167,0.12); }
    .form-label { font-weight: 600; font-size: 0.85rem; color: var(--text-main); margin-bottom: 0.35rem; }
    .form-text-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.85rem; }
    .form-text-link:hover { color: var(--primary); }
  </style>
</head>
<body>

<main class="login-card fade-in-up">
  <div class="login-illustration" role="img" aria-label="Care City"></div>
  <div class="login-logo"><span style="color:var(--accent);">●</span> Care Plus</div>
  <p style="text-align:center; color:var(--text-muted); font-size:0.88rem; margin-bottom:1.75rem;">
    Entre para acessar sua Care City
  </p>

  <form id="login-form" novalidate>
    <div class="mb-3">
      <label class="form-label" for="email">E-mail</label>
      <input type="email" class="form-control" id="email" placeholder="ana@careplus.com" value="ana@careplus.com" required>
      <div class="invalid-feedback">Informe um e-mail válido.</div>
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Senha</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••" value="123456" required>
      <div class="invalid-feedback">A senha é obrigatória.</div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <label style="font-size:0.82rem; color:var(--text-muted);">
        <input type="checkbox" checked> Lembrar de mim
      </label>
      <a href="#" class="form-text-link">Esqueci a senha</a>
    </div>
    <button type="submit" class="btn-cp-primary" style="width:100%; padding:0.8rem;">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>
  </form>

  <hr style="margin: 1.5rem 0; border-color: var(--border);">
  <p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin:0;">
    Não tem conta? <a href="#" class="form-text-link">Crie agora</a>
  </p>
</main>

<script>
document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault()
  const email = document.getElementById('email')
  const pass = document.getElementById('password')
  let ok = true
  if (!email.value.trim() || !email.value.includes('@')) { email.classList.add('is-invalid'); ok = false } else email.classList.remove('is-invalid')
  if (!pass.value.trim()) { pass.classList.add('is-invalid'); ok = false } else pass.classList.remove('is-invalid')
  if (ok) window.location.href = 'dashboard.html'
})
</script>
</body>
</html>
